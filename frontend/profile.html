<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Event - Set Up Your Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="container nav-content">
      <h1 class="logo">Live Event</h1>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="events.html">Events</a></li>
          <li><a class="active" href="profile.html">Profile</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="settings.html">Settings</a></li>
          <li><a href="about.html">About Us</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="profile-page">
    <div class="container login-page-inner">
      <form id="profile-form" class="login-card profile-card">
        <h2>Set Up Your Profile</h2>
        <p class="login-subtitle">Tell others a little about yourself.</p>

        <div class="form-field">
          <label for="profile-fullname">Full Name</label>
          <input
            type="text"
            id="profile-fullname"
            name="full-name"
            placeholder="Alex Johnson"
            autocomplete="name"
          />
        </div>

        <div class="form-field">
          <label for="profile-bio">Bio</label>
          <textarea
            id="profile-bio"
            name="bio"
            rows="4"
            placeholder="I enjoy music events, coding meetups, and outdoor activities."
          ></textarea>
        </div>

        <div class="form-field">
          <label for="profile-interests">Interests</label>
          <input
            type="text"
            id="profile-interests"
            name="interests"
            placeholder="Music, Tech, Sports"
          />
        </div>

        <div class="form-field">
          <label for="profile-school">School</label>
          <input
            type="text"
            id="profile-school"
            name="school"
            placeholder="California State University, Sacramento"
          />
        </div>

        <div class="form-field">
          <label for="profile-location">Location</label>
          <input
            type="text"
            id="profile-location"
            name="location"
            placeholder="Sacramento, CA"
          />
        </div>

        <button type="submit" id="profile-save-btn" class="login-submit-btn">
          Save Profile
        </button>
      </form>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
