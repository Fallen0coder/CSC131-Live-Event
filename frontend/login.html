<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Event - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <script src="early-init.js"></script>
  <header class="navbar">
    <div class="container nav-content">
      <h1 class="logo">Live Event</h1>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="events.html">Events</a></li>
          <li id="profile-link" class="is-hidden"><a href="profile.html" class="nav-link--profile">Profile</a></li>
          <li id="friends-link" class="is-hidden"><a href="friends.html">Friends</a></li>
          <li id="login-link"><a class="active" href="login.html">Login</a></li>
          <li><a href="settings.html" class="nav-link--settings">Settings</a></li>
          <li><a href="about.html">About Us</a></li>
          <li id="nav-logout-li" class="is-hidden">
            <button type="button" id="nav-logout-btn" class="nav-logout-btn">Log out</button>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="login-page">
    <div class="container login-page-inner">
      <form id="login-form" class="login-card">
        <h2>Log in</h2>
        <p class="login-subtitle">Enter your email and password to continue.</p>

        <div class="form-field">
          <label for="login-email">Email</label>
          <input
            type="email"
            id="login-email"
            name="email"
            placeholder="you@example.edu"
            autocomplete="email"
          />
        </div>

        <div class="form-field">
          <label for="login-password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="login-password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button
              type="button"
              class="password-toggle"
              data-password-toggle="login-password"
              aria-label="Show password"
              aria-pressed="false"
            >
              <span class="password-toggle-icon" aria-hidden="true">👁️</span>
            </button>
          </div>
        </div>

        <button type="submit" id="login-submit-btn" class="login-submit-btn">
          Login
        </button>

        <p id="login-message" class="settings-message" role="status" aria-live="polite"></p>

        <p class="login-signup">
          Don't have an account?
          <a href="signup.html">Sign up</a>
        </p>
      </form>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
