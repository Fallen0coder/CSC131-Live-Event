<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up &mdash; Live Event</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- Navigation Bar -->
    <nav class="navbar">
      <div class="nav-container">
        <a href="index.html" class="nav-logo">Live Event</a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="events.html">Events</a></li>
          <li><a href="profile.html">Profile</a></li>
          <li><a href="login.html" class="nav-login">Login</a></li>
        </ul>
      </div>
    </nav>

    <!-- Signup Page Body -->
    <main class="auth-page">

      <div class="auth-blob"></div>

      <div class="auth-card">

        <div class="auth-header">
          <span class="auth-icon">🎉</span>
          <h1>Create your account</h1>
          <p>Join Live Event and start discovering what's happening near you.</p>
        </div>

        <!-- Status message (hidden until fetch gets a response) -->
        <div id="signup-msg" class="auth-message" aria-live="polite"></div>

        <form id="signup-form" class="auth-form" action="#" method="post" novalidate>

          <div class="form-group">
            <label for="email">Email address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@university.edu"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="At least 6 characters"
              required
            />
          </div>

          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input
              type="password"
              id="confirm-password"
              name="confirm_password"
              placeholder="Re-enter your password"
              required
            />
          </div>

          <button type="submit" id="signup-btn" class="btn-primary btn-full">Create Account</button>

        </form>

        <p class="auth-switch">
          Already have an account? <a href="login.html">Log in</a>
        </p>

        <div class="auth-divider"><span>or continue with</span></div>

        <button class="btn-google">
          <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google
        </button>

      </div>

    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2026 Live Event &mdash; Built for students, by students.</p>
    </footer>

    <script>
      // ── Where your Flask server is running ──────────────────────────────
      const API = "http://127.0.0.1:5001";

      // Helper: display a message banner above the form
      function showMessage(elementId, text, isSuccess) {
        const box = document.getElementById(elementId);
        box.textContent = text;
        box.className = "auth-message " + (isSuccess ? "msg-success" : "msg-error");
      }

      // ── Signup form submission ───────────────────────────────────────────
      document.getElementById("signup-form").addEventListener("submit", async function (e) {
        e.preventDefault();

        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const confirm  = document.getElementById("confirm-password").value.trim();
        const btn      = document.getElementById("signup-btn");

        // Front-end validation before hitting the server
        if (!email || !password || !confirm) {
          showMessage("signup-msg", "Please fill in all fields.", false);
          return;
        }

        if (password.length < 6) {
          showMessage("signup-msg", "Password must be at least 6 characters.", false);
          return;
        }

        if (password !== confirm) {
          showMessage("signup-msg", "Passwords do not match.", false);
          return;
        }

        btn.disabled    = true;
        btn.textContent = "Creating account…";

        try {
          const response = await fetch(API + "/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
          });

          const data = await response.json();

          if (data.success) {
            showMessage("signup-msg", "✅ " + data.message, true);
            // Redirect to login after a short delay
            setTimeout(() => { window.location.href = "login.html"; }, 2000);
          } else {
            showMessage("signup-msg", "❌ " + data.message, false);
          }

        } catch (err) {
          showMessage("signup-msg", "❌ Could not reach the server. Is Flask running?", false);
        }

        btn.disabled    = false;
        btn.textContent = "Create Account";
      });
    </script>

  </body>
</html>
