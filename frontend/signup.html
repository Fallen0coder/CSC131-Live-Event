<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Event - Sign up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="container nav-content">
      <h1 class="logo">Live Event</h1>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="events.html">Events</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="settings.html">Settings</a></li>
          <li><a href="about.html">About Us</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="signup-page">
    <div class="container login-page-inner">
      <form id="signup-form" class="login-card">
        <h2>Create an account</h2>
        <p class="login-subtitle">Join Live Event to discover and connect on campus.</p>

        <div class="form-field">
          <label for="signup-fullname">Full Name</label>
          <input
            type="text"
            id="signup-fullname"
            name="fullname"
            placeholder="Alex Johnson"
            autocomplete="name"
          />
        </div>

        <div class="form-field">
          <label for="signup-email">Email</label>
          <input
            type="email"
            id="signup-email"
            name="email"
            placeholder="you@example.edu"
            autocomplete="email"
          />
        </div>

        <div class="form-field">
          <label for="signup-password">Password</label>
          <input
            type="password"
            id="signup-password"
            name="password"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>

        <div class="form-field">
          <label for="signup-confirm">Confirm Password</label>
          <input
            type="password"
            id="signup-confirm"
            name="confirm"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>

        <button type="submit" id="signup-submit-btn" class="login-submit-btn">
          Sign up
        </button>

        <p class="login-signup">
          Already have an account?
          <a href="login.html">Log in</a>
        </p>
      </form>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
