<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Event - Sign up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="navbar">
    <div class="container nav-content">
      <h1 class="logo">Live Event</h1>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="events.html">Events</a></li>
          <li id="profile-link" class="is-hidden"><a href="profile.html">Profile</a></li>
          <li id="friends-link" class="is-hidden"><a href="friends.html">Friends</a></li>
          <li id="login-link"><a href="login.html">Login</a></li>
          <li><a href="settings.html">Settings</a></li>
          <li><a href="about.html">About Us</a></li>
          <li id="nav-logout-li" class="is-hidden">
            <button type="button" id="nav-logout-btn" class="nav-logout-btn">Log out</button>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="signup-page">
    <div class="container login-page-inner">
      <form id="signup-form" class="login-card" novalidate>
        <h2>Create an account</h2>
        <p class="login-subtitle">Join Live Event to discover and connect on campus.</p>

        <div class="form-field">
          <label for="signup-fullname">Full Name</label>
          <input
            type="text"
            id="signup-fullname"
            name="fullname"
            placeholder="Alex Johnson"
            autocomplete="name"
          />
        </div>

        <div class="form-field">
          <label for="signup-username">Username</label>
          <input
            type="text"
            id="signup-username"
            name="username"
            placeholder="alexj"
            autocomplete="username"
          />
        </div>

        <div class="form-field">
          <label for="signup-email">Email</label>
          <input
            type="email"
            id="signup-email"
            name="email"
            placeholder="you@example.edu"
            autocomplete="email"
          />
        </div>

        <div class="form-field">
          <label for="signup-password">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="signup-password"
              name="password"
              placeholder="••••••••"
              autocomplete="new-password"
              aria-describedby="password-strength-hint"
            />
            <button
              type="button"
              class="password-toggle"
              data-password-toggle="signup-password"
              aria-label="Show password"
              aria-pressed="false"
            >
              <span class="password-toggle-icon" aria-hidden="true">👁️</span>
            </button>
          </div>
          <div
            id="password-strength"
            class="password-strength"
            aria-live="polite"
          >
            <div class="password-strength-bar">
              <div class="password-strength-bar-fill"></div>
            </div>
            <p class="password-strength-label"></p>
          </div>
          <p id="password-strength-hint" class="password-hint">
            Use 8+ characters, uppercase, lowercase, number, and symbol.
          </p>
        </div>

        <div class="form-field">
          <label for="signup-confirm">Confirm Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="signup-confirm"
              name="confirm"
              placeholder="••••••••"
              autocomplete="new-password"
              aria-describedby="password-match"
            />
            <button
              type="button"
              class="password-toggle"
              data-password-toggle="signup-confirm"
              aria-label="Show password"
              aria-pressed="false"
            >
              <span class="password-toggle-icon" aria-hidden="true">👁️</span>
            </button>
          </div>
          <p id="password-match" class="password-match" aria-live="polite"></p>
        </div>

        <button type="submit" id="signup-submit-btn" class="login-submit-btn">
          Sign up
        </button>

        <p id="signup-message" class="settings-message" role="status" aria-live="polite"></p>

        <p class="login-signup">
          Already have an account?
          <a href="login.html">Log in</a>
        </p>
      </form>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
